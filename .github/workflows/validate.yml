name: Validate

on:
  push:
  pull_request:

jobs:
  degrees:
    name: Validate degree packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Validate degrees
        run: npm run validate
